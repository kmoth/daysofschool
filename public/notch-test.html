<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f34a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Unsafe Area Blur Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #f2f34a;
      }

      body {
        color: #05070a;
      }

      .top-third-blur {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 2;
        height: 33.333vh;
        height: 33.333dvh;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.08);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }

      .stripe {
        display: grid;
        min-height: 116px;
        place-items: center;
        padding: 12px;
        font-size: clamp(42px, 18vw, 96px);
        font-weight: 900;
        line-height: 0.9;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 3px 0 #ffffff;
      }

      .stripe:nth-child(6n + 1) {
        background: #f2f34a;
      }

      .stripe:nth-child(6n + 2) {
        background: #5be7c4;
      }

      .stripe:nth-child(6n + 3) {
        background: #ff8a5b;
      }

      .stripe:nth-child(6n + 4) {
        background: #7aa7ff;
      }

      .stripe:nth-child(6n + 5) {
        background: repeating-linear-gradient(
          135deg,
          #ffffff 0,
          #ffffff 18px,
          #c23a3a 18px,
          #c23a3a 28px
        );
      }

      .stripe:nth-child(6n) {
        background: #f5d547;
      }

      .safe-readout {
        position: fixed;
        right: 10px;
        bottom: 10px;
        z-index: 3;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.84);
        border: 2px solid #05070a;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 800;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div class="top-third-blur" aria-hidden="true"></div>
    <main aria-label="Unsafe area fixed blur test">
      <section class="stripe">Top content</section>
      <section class="stripe">Blur test</section>
      <section class="stripe">Band 03</section>
      <section class="stripe">Band 04</section>
      <section class="stripe">Band 05</section>
      <section class="stripe">Band 06</section>
      <section class="stripe">Band 07</section>
      <section class="stripe">Band 08</section>
      <section class="stripe">Band 09</section>
      <section class="stripe">Band 10</section>
      <section class="stripe">Band 11</section>
      <section class="stripe">Band 12</section>
      <section class="stripe">Band 13</section>
      <section class="stripe">Band 14</section>
      <section class="stripe">Band 15</section>
      <section class="stripe">Band 16</section>
      <section class="stripe">Band 17</section>
      <section class="stripe">Band 18</section>
    </main>
    <div class="safe-readout" id="readout">loading</div>
    <script>
      const readout = document.querySelector("#readout");

      function updateReadout() {
        readout.textContent = [
          `scrollY ${Math.round(window.scrollY)}`,
          `inner ${Math.round(window.innerWidth)}x${Math.round(window.innerHeight)}`,
          `visual ${Math.round(window.visualViewport?.width || 0)}x${Math.round(window.visualViewport?.height || 0)}`,
        ].join(" / ");
      }

      updateReadout();
      window.addEventListener("scroll", updateReadout, { passive: true });
      window.addEventListener("resize", updateReadout);
      window.visualViewport?.addEventListener("resize", updateReadout);
      window.visualViewport?.addEventListener("scroll", updateReadout);
    </script>
  </body>
</html>
